
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HR Login | HRMS</title>

    
    <link rel="stylesheet" href="HR_login.css">

  
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="login-card">

       

        <div class="logo">
            <div class="icon">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
        </div>

        <h1>HR- Login</h1>

        <p class="subtitle">
            Welcome Back! Please login to your account.
        </p>

       

        <form>

           

            <div class="input-box">

                <i class="fa-regular fa-user"></i>

                <input
                type="text"
                placeholder="HR- ID"
                required>

            </div>

           

            <div class="input-box">

                <i class="fa-regular fa-envelope"></i>

                <input
                type="email"
                placeholder="Email"
                required>

            </div>

            

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                id="password"
                type="password"
                placeholder="Password"
                required>

               

            </div>

           

            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember me

                </label>

                <a href="#">
                    Forgot Password?
                </a>

            </div>

            

            <button type="submit">
                Login
            </button>

        </form>

        

        <div class="back">

            <a href="index.html">

                <i class="fa-solid fa-arrow-left"></i>

                Back to Home

            </a>

        </div>

    </div>

</div>

<script src="hr_login.js"></script>

</body>
</html>
